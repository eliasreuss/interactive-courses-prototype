<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inact Learn — Home</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  @property --bloom-r {
    syntax: '<percentage>';
    inherits: true;
    initial-value: 0%;
  }

  :root {
    --color-primary: #304642;
    --color-primary-light: #3d5a54;
    --color-accent: #FF5A00;
    --color-accent-glow: rgba(255, 90, 0, 0.25);
    --color-bg: #F9F7F5;
    --color-card-bg: #FFFFFF;
    --color-muted: #8A9A97;
    --color-text-secondary: rgba(48, 70, 66, 0.6);
    --color-tag-bg: #F0F0F0;
    --color-progress-bg: #EBEBEB;
    --font-family: 'Poppins', sans-serif;
    --shadow-card: 0 2px 8px rgba(48, 70, 66, 0.06), 0 8px 24px rgba(48, 70, 66, 0.08);
    --shadow-card-hover: 0 8px 16px rgba(48, 70, 66, 0.08), 0 24px 48px rgba(48, 70, 66, 0.12);
    --shadow-header: 0 1px 0 rgba(48, 70, 66, 0.06);
    --radius-lg: 20px;
    --radius-md: 14px;
    --radius-sm: 10px;
    --transition-smooth: cubic-bezier(0.4, 0, 0.2, 1);
    --page-margin: 60px;
    --page-margin-top: 20px;
  }

  @media (min-width: 1400px) { :root { --page-margin: 100px; } }
  @media (min-width: 1600px) { :root { --page-margin: 132px; } }
  @media (min-width: 1920px) { :root { --page-margin: 176px; } }
  @media (min-width: 2200px) { :root { --page-margin: 260px; } }
  @media (min-width: 2560px) { :root { --page-margin: 360px; } }

  @media (min-width: 1400px) { #view-catalog { --page-margin: 160px; } }
  @media (min-width: 1600px) { #view-catalog { --page-margin: 220px; } }
  @media (min-width: 1920px) { #view-catalog { --page-margin: 320px; } }
  @media (min-width: 2200px) { #view-catalog { --page-margin: 420px; } }
  @media (min-width: 2560px) { #view-catalog { --page-margin: 520px; } }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-family);
    background: var(--color-bg);
    min-height: 100vh;
    color: var(--color-primary);
    background-image: radial-gradient(circle at 1px 1px, rgba(48, 70, 66, 0.03) 1px, transparent 0);
    background-size: 24px 24px;
  }

  /* ── HEADER ─────────────────────────────────── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 40px;
    background: rgba(255, 255, 255, 0.95);
    box-shadow: var(--shadow-header);
    border-radius: 0 0 25px 25px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(48, 70, 66, 0.08);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 40px;
  }

  .logo {
    font-size: 22px;
    font-weight: 800;
    color: var(--color-primary);
    letter-spacing: -0.5px;
    text-decoration: none;
    cursor: pointer;
  }
  .logo span { color: var(--color-accent); font-weight: 800; }

  .nav {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .nav a {
    text-decoration: none;
    color: var(--color-primary);
    font-size: 14px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 100px;
    transition: all 0.2s var(--transition-smooth);
    opacity: 0.65;
  }
  .nav a:hover { opacity: 1; background: var(--color-tag-bg); }
  .nav a.active { opacity: 1; background: rgba(48, 70, 66, 0.08); font-weight: 600; }
  .nav a.locked { display: inline-flex; align-items: center; gap: 6px; pointer-events: none; }
  .nav a.locked .lock-icon { width: 12px; height: 12px; opacity: 0.5; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .nav-notif-btn {
    width: 36px; height: 36px;
    background: var(--color-accent);
    border-radius: 500px;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.2s var(--transition-smooth), background 0.2s ease;
  }
  .nav-notif-btn:hover { transform: scale(1.08); background: #D94E00; }
  .nav-notif-icon {
    width: 14px; height: 18px;
    display: block; flex-shrink: 0;
    background-color: white;
    -webkit-mask-image: url('SVGs/learn-bookmark-icon.svg');
    mask-image: url('SVGs/learn-bookmark-icon.svg');
    -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
    -webkit-mask-position: center; mask-position: center;
    -webkit-mask-size: contain; mask-size: contain;
  }

  .nav-avatar {
    width: 35px; height: 35px;
    background: #D9EBFF;
    border-radius: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: transform 0.2s var(--transition-smooth);
  }
  .nav-avatar:hover { transform: scale(1.08); }
  .nav-avatar span {
    color: #1F5591;
    font-size: 13px;
    font-weight: 600;
    line-height: 1;
    font-family: var(--font-family);
    letter-spacing: 0;
  }

  /* ── VIEWS ──────────────────────────────────── */
  .view { display: none; }
  .view.is-active { display: block; animation: viewIn 0.25s cubic-bezier(0.22, 1, 0.36, 1); }
  @keyframes viewIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .main-container {
    display: flex;
    flex-direction: column;
    min-height: calc(100vh - 72px);
  }

  /* ── HERO HEADER ────────────────────────────── */
  .hero-header {
    background: var(--color-primary);
    border-radius: 25px;
    margin: var(--page-margin-top) var(--page-margin) 20px;
    padding: 47px 63px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 40px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.25) inset, 0 18px 48px rgba(0, 0, 0, 0.14);
    opacity: 0;
    transform: translateY(16px);
    animation: heroEnter 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.05s forwards;
    position: relative;
    overflow: hidden;
  }

  /* Independent grid layer — translates opposite to cursor */
  .hero-grid-layer {
    position: absolute;
    inset: -40px;
    background:
      linear-gradient(to right, rgba(255, 255, 255, 0.06) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
    background-size: 120px 120px;
    pointer-events: none;
    will-change: transform;
  }
  @media (hover: none) {
    .hero-grid-layer {
      inset: 0;
      animation: gridAmbient 32s ease-in-out infinite alternate;
    }
  }
  @keyframes gridAmbient {
    from { transform: translate(-10px, -7px); }
    to { transform: translate(10px, 7px); }
  }
  @keyframes heroEnter {
    to { opacity: 1; transform: translateY(0); }
  }

  /* No-progress state: center content vertically */
  .hero-header.no-progress {
    align-items: center;
  }

  .hero-content {
    width: min(520px, 100%);
    display: flex;
    flex-direction: column;
    gap: 0;
    flex: 1;
    position: relative;
    z-index: 1;
    will-change: transform;
  }
  .hero-content .hero-text { margin-bottom: 28px; }
  .hero-content .hero-bar-row { margin-bottom: 20px; }

  .hero-tags {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  /* Glass utility */
  .glass {
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(7px);
    -webkit-backdrop-filter: blur(7px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.5), inset 0 -1px 0 rgba(255, 255, 255, 0.1);
    position: relative;
    overflow: hidden;
  }
  .glass::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.8), transparent);
    pointer-events: none;
  }
  .glass::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 1px; height: 100%;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.8), transparent, rgba(255, 255, 255, 0.3));
    pointer-events: none;
  }
  .glass > * { position: relative; z-index: 1; }

  .hero-tag {
    padding: 9px 21px;
    border-radius: 500px;
    display: flex;
    align-items: center;
    gap: 10px;
    color: white;
    font-size: 14px;
    font-weight: 400;
    line-height: 20px;
  }
  .hero-tag.primary { font-weight: 700; }

  .hero-tag-icon {
    width: 16px; height: 15px;
    display: block;
    flex-shrink: 0;
  }

  .hero-text { display: flex; flex-direction: column; gap: 12px; }

  .hero-title {
    color: white;
    font-size: clamp(28px, 2.4vw + 0.5rem, 44px);
    font-weight: 700;
    line-height: 1.06;
    letter-spacing: -0.04em;
  }

  .hero-next {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .hero-next-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.6px;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.4);
    line-height: 1;
  }
  .hero-next-name {
    font-size: 17px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.85);
    line-height: 1.4;
  }

  .hero-actions {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .btn-start {
    padding: 9px 21px;
    background: var(--color-accent);
    border-radius: 500px;
    display: inline-flex;
    align-items: center;
    gap: 12px;
    color: white;
    font-size: 17px;
    font-weight: 600;
    line-height: 24px;
    text-decoration: none;
    border: none;
    cursor: pointer;
    font-family: var(--font-family);
    transition: all 0.2s var(--transition-smooth);
    position: relative;
    overflow: hidden;
  }
  .btn-start::before {
    content: '';
    position: absolute;
    top: -50%; left: 0;
    width: 45%; height: 200%;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.24), transparent);
    transform: skewX(-20deg) translateX(-250%);
    animation: btnShimmer 5s ease-in-out 2.2s infinite;
    pointer-events: none;
  }
  @keyframes btnShimmer {
    0%, 78%, 100% { transform: skewX(-20deg) translateX(-250%); }
    5% { opacity: 1; }
    55% { transform: skewX(-20deg) translateX(480%); }
  }
  .btn-start:hover { transform: translateY(-2px); background: #D94E00; box-shadow: 0 6px 20px rgba(255, 90, 0, 0.35); }
  .btn-start-arrow {
    width: 7px; height: 14px;
    background: white;
    -webkit-mask-image: url('SVGs/ButtonArrow.svg');
    mask-image: url('SVGs/ButtonArrow.svg');
    -webkit-mask-repeat: no-repeat;
    mask-repeat: no-repeat;
    -webkit-mask-position: center;
    mask-position: center;
    -webkit-mask-size: contain;
    mask-size: contain;
    display: inline-block;
    flex: 0 0 auto;
  }

  .btn-view {
    padding: 9px 21px;
    background: var(--color-primary);
    border-radius: 500px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    color: white;
    font-size: 17px;
    font-weight: 400;
    line-height: 24px;
    text-decoration: none;
    border: 1px solid rgba(159, 159, 159, 0.5);
    cursor: pointer;
    font-family: var(--font-family);
    transition: all 0.2s var(--transition-smooth);
  }
  .btn-view:hover { transform: translateY(-2px); background: #253835; box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2); }

  /* Two-segment progress bar */
  .hero-bar-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .hero-bar {
    display: flex;
    height: 6px;
    border-radius: 50px;
    overflow: hidden;
    flex: 1;
    max-width: 380px;
    gap: 0;
  }
  .hero-bar-done {
    height: 100%;
    background: #4F6662;
    border-radius: 50px;
    flex-shrink: 0;
    min-width: 0;
    transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .hero-bar-done:empty, .hero-bar-done[style*="width:0%"] { display: none; }
  .hero-bar-remaining {
    height: 100%;
    background: var(--color-accent);
    border-radius: 50px;
    flex: 1;
  }
  .hero-bar-label {
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.01em;
  }

  /* ── COURSE CHECKLIST PANEL ─────────────────── */
  .hero-checklist {
    background: #283B37;
    box-shadow: inset 0 4px 15px rgba(0, 0, 0, 0.25);
    border-radius: 15px;
    padding: 20px 22px;
    min-width: 210px;
    flex-shrink: 0;
    opacity: 1;
    transition: opacity 0.35s cubic-bezier(0.22, 1, 0.36, 1) 0.35s;
    position: relative;
    z-index: 2;
    will-change: transform;
  }
  @starting-style {
    .hero-checklist { opacity: 0; }
  }
  .checklist-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.42);
    margin-bottom: 18px;
    line-height: 1;
  }
  .checklist-items { display: flex; flex-direction: column; gap: 11px; }
  .checklist-item {
    display: flex;
    align-items: center;
    gap: 10px;
    opacity: 1;
    transform: translateY(0);
    transition:
      opacity 0.55s cubic-bezier(0.22, 1, 0.36, 1) calc(0.5s + var(--i, 0) * 0.08s),
      transform 0.55s cubic-bezier(0.22, 1, 0.36, 1) calc(0.5s + var(--i, 0) * 0.08s);
  }
  @starting-style {
    .checklist-item { opacity: 0; transform: translateY(5px); }
  }
  .checklist-dot {
    width: 22px; height: 22px;
    border-radius: 100px;
    display: grid;
    place-items: center;
    flex-shrink: 0;
    font-size: 10px;
    font-weight: 600;
    color: white;
    background: #405754;
  }
  .checklist-dot.is-done { background: #374e4a; }
  .checklist-dot.is-active {
    background: var(--color-accent);
    box-shadow: 0 0 0 3px rgba(255, 90, 0, 0.3);
    transition: box-shadow 0.6s cubic-bezier(0.22, 1, 0.36, 1) 1.1s;
  }
  @starting-style {
    .checklist-dot.is-active { box-shadow: 0 0 0 0 rgba(255, 90, 0, 0); }
  }
  .checklist-label { font-size: 13px; color: rgba(255,255,255,0.88); font-weight: 400; line-height: 1.4; }
  .checklist-item.is-done .checklist-label { color: rgba(255,255,255,0.28); text-decoration: line-through; }

  /* ── CONTENT AREA ───────────────────────────── */
  .content-area {
    flex: 1;
    padding: var(--page-margin-top) var(--page-margin) var(--page-margin);
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .content-card {
    background: white;
    border-radius: 22px;
    padding: 24px 28px 28px;
    box-shadow: 0 2px 8px rgba(48, 70, 66, 0.05), 0 8px 24px rgba(48, 70, 66, 0.06);
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .section-label {
    font-size: 20px;
    font-weight: 600;
    color: var(--color-primary);
    letter-spacing: -0.2px;
    margin-bottom: 4px;
  }

  .welcome-greeting {
    color: var(--color-primary);
    font-size: 16px;
    font-weight: 400;
    line-height: 24px;
    opacity: 0.75;
  }
  .welcome-headline {
    color: var(--color-primary);
    font-size: 24px;
    font-weight: 600;
    line-height: 32px;
    letter-spacing: -0.3px;
  }

  /* ── PATH CARDS GRID ────────────────────────── */
  #paths-grid, #catalog-grid, #bm-grid, #soon-grid {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  @media (min-width: 700px) {
    #paths-grid, #catalog-grid, #bm-grid, #soon-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
  }
  @media (min-width: 1200px) {
    #paths-grid, #catalog-grid, #bm-grid, #soon-grid {
      grid-template-columns: repeat(3, 1fr);
    }
  }

  /* ── SECTION LABEL WITH ICON ────────────────── */
  .section-label {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label-icon {
    width: 22px; height: 22px;
    flex-shrink: 0;
  }

  /* ── COMING SOON SEPARATOR ──────────────────── */
  .more-coming-soon {
    font-size: 14px;
    font-weight: 500;
    font-style: italic;
    color: rgba(48, 70, 66, 0.45);
    padding: 4px 0 2px;
  }

  /* ── PATH CARD ──────────────────────────────── */
  .course-card {
    display: flex;
    flex-direction: column;
    border-radius: 17.76px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    background: transparent;
    border: 1px solid var(--card-bdr, transparent);
    box-shadow: 0 10px 28px rgba(48, 70, 66, 0.14);
    transition: transform 420ms cubic-bezier(0.22, 1, 0.36, 1), box-shadow 420ms cubic-bezier(0.22, 1, 0.36, 1);
    opacity: 0;
    transform: translateY(24px);
  }
  .course-card.visible {
    animation: cardEnter 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  /* LP stack: nth-child targets the wrapper */
  .lp-stack-wrap:nth-child(1) .course-card { animation-delay: 0.04s; }
  .lp-stack-wrap:nth-child(2) .course-card { animation-delay: 0.10s; }
  .lp-stack-wrap:nth-child(3) .course-card { animation-delay: 0.16s; }
  .lp-stack-wrap:nth-child(4) .course-card { animation-delay: 0.22s; }
  .lp-stack-wrap:nth-child(5) .course-card { animation-delay: 0.28s; }
  .lp-stack-wrap:nth-child(6) .course-card { animation-delay: 0.34s; }
  /* Catalog grid without wrapper (bookmark grid, etc.) keeps original delays */
  #catalog-grid .course-card:nth-child(1),
  #bm-grid .course-card:nth-child(1) { animation-delay: 0.04s; }
  #catalog-grid .course-card:nth-child(2),
  #bm-grid .course-card:nth-child(2) { animation-delay: 0.10s; }
  @keyframes cardEnter { to { opacity: 1; transform: translateY(0); } }

  .course-card:hover { transform: translateY(-6px); box-shadow: 0 22px 56px var(--card-glow, rgba(48, 70, 66, 0.22)); }
  .course-card:hover .course-title { color: oklch(0.38 0.05 165); }

  /* In-progress card: orange gradient border */
  .course-card.next-course {
    border: 2px solid transparent;
    background-image:
      linear-gradient(white, white),
      linear-gradient(135deg, rgba(255, 90, 0, 0.45) 0%, rgba(255, 90, 0, 0.12) 50%, rgba(255, 90, 0, 0.35) 100%);
    background-origin: border-box;
    background-clip: padding-box, border-box;
    box-shadow: 0 10px 32px rgba(255, 90, 0, 0.12), 0 2px 8px rgba(255, 90, 0, 0.08);
  }
  .course-card.next-course:hover {
    box-shadow: 0 22px 56px rgba(255, 90, 0, 0.18), 0 4px 12px rgba(255, 90, 0, 0.10);
  }
  .course-card.next-course .course-cta { color: var(--color-accent); }
  .course-card.next-course .course-cta-arrow {
    filter: brightness(0) saturate(100%) invert(44%) sepia(89%) saturate(3000%) hue-rotate(11deg) brightness(101%) contrast(105%);
  }

  /* ── COMING SOON CARD ───────────────────────── */
  .course-card.is-soon {
    cursor: default;
    background: white;
    box-shadow: none;
    border: 1.5px dashed rgba(48, 70, 66, 0.22);
    border-radius: 14px;
    overflow: visible;
    opacity: 0;
    transform: translateY(20px);
  }
  .course-card.is-soon.visible { animation: cardEnter 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
  .course-card.is-soon:hover { transform: none; box-shadow: none; }

  .soon-card-inner {
    padding: 20px 22px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .soon-card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  .soon-card-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--color-primary);
    line-height: 1.4;
  }
  .soon-card-lock {
    width: 18px; height: 18px;
    flex-shrink: 0;
    opacity: 0.35;
    margin-top: 2px;
  }
  .soon-card-footer {
    display: flex;
    align-items: center;
    gap: 6px;
    color: rgba(48, 70, 66, 0.45);
    font-size: 13px;
    font-weight: 400;
  }
  .soon-card-clock {
    width: 14px; height: 14px;
    flex-shrink: 0;
    opacity: 0.6;
  }

  /* Card thumbnail */
  .course-card-top {
    height: 160px;
    background: linear-gradient(var(--grad-dir, 135deg), #2e4a44 0%, #3d5e55 100%);
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  .course-card-thumb {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 420ms var(--transition-smooth);
  }
  .course-card:hover .course-card-thumb { transform: scale(1.04); }

  /* Hub-style thumbnail with centered illustration */
  .course-card-top.is-hub-thumb {
    background-color: var(--card-bg, #FFFDF9);
    background-image: radial-gradient(circle, rgba(0,0,0,0.065) 1px, transparent 1px);
    background-size: 20px 20px;
  }
  .course-card-illu {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    max-height: 82%;
    max-width: 52%;
    object-fit: contain;
    mix-blend-mode: multiply;
    pointer-events: none;
    transition: transform 420ms cubic-bezier(0.16,1,0.3,1);
  }
  .course-card:hover .course-card-illu {
    transform: translate(-50%, -53%) scale(1.04);
  }

  /* Learning Path badge in thumbnail — hub pill style */
  .lp-badge {
    position: absolute;
    top: 19px; left: 19px;
    padding: 9px 19px;
    border-radius: 118px;
    background: var(--pill-bg, rgba(238, 224, 195, 0.30));
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 14px; font-weight: 500; line-height: 20px;
    color: var(--pill-text, #2C2416);
    z-index: 3;
    pointer-events: none;
  }
  .lp-badge-icon {
    width: 15px; height: 14px; flex-shrink: 0;
    background-color: var(--pill-text, #2C2416);
    -webkit-mask-image: url('SVGs/Learning-Path.svg');
    mask-image: url('SVGs/Learning-Path.svg');
    -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
    -webkit-mask-position: center; mask-position: center;
    -webkit-mask-size: contain; mask-size: contain;
    display: block;
  }

  /* Per-card gradient directions */
  .course-card:nth-child(1) .course-card-top { --grad-dir: 135deg; }
  .course-card:nth-child(2) .course-card-top { --grad-dir: 200deg; }
  .course-card:nth-child(3) .course-card-top { --grad-dir: 310deg; }
  .course-card:nth-child(4) .course-card-top { --grad-dir: 60deg; }
  .course-card:nth-child(5) .course-card-top { --grad-dir: 250deg; }

  /* ── CARD TOP BAR ───────────────────────────── */
  .card-top-bar {
    position: absolute;
    top: 14px; left: 14px; right: 14px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 4; pointer-events: none;
  }
  .card-type-pill {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 10px 14px 10px 12px;
    border-radius: 100px;
    background: var(--pill-bg, rgba(238, 224, 195, 0.30));
    font-size: 13px; font-weight: 600; line-height: 1;
    color: #304642;
    white-space: nowrap;
  }
  .card-type-icon {
    display: inline-block;
    width: 14px; height: 14px; flex-shrink: 0;
    background-color: #304642;
    -webkit-mask-image: url('SVGs/Learning-Path.svg');
    mask-image: url('SVGs/Learning-Path.svg');
    -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
    -webkit-mask-size: contain; mask-size: contain;
    -webkit-mask-position: center; mask-position: center;
  }
  .card-top-right {
    display: flex; align-items: center; gap: 6px;
    pointer-events: all;
  }
  .course-duration-pill {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 10px 14px;
    border-radius: 100px;
    background: var(--pill-bg, rgba(238, 224, 195, 0.30));
    color: #304642;
    font-size: 13px; font-weight: 500; line-height: 1;
    white-space: nowrap;
  }

  /* Accent bar between thumb and body */
  .card-accent-bar {
    height: 6px;
    background: var(--color-primary);
    flex-shrink: 0;
  }

  /* Progress bar */
  .card-progress {
    height: 6px;
    background: rgba(0, 0, 0, 0.12);
    position: relative;
    flex-shrink: 0;
  }
  .card-progress-fill {
    height: 100%;
    width: 0%;
    background: var(--color-primary);
    border-radius: 0 6px 6px 0;
    transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card-progress.completed .card-progress-fill { border-radius: 0; }

  /* Card body */
  .course-card-bottom {
    padding: 28px;
    background: white;
    border-bottom-right-radius: 17.76px;
    border-bottom-left-radius: 17.76px;
    display: flex;
    flex-direction: column;
    gap: 0;
    flex: 1;
  }

  .course-title {
    color: var(--color-primary);
    font-size: 22px;
    font-weight: 600;
    line-height: 30px;
    letter-spacing: -0.4px;
    margin-bottom: 10px;
    transition: color 200ms ease;
  }

  .course-description {
    color: rgba(48, 70, 66, 0.55);
    font-size: 15px;
    font-weight: 400;
    line-height: 22px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .course-cta-row {
    margin-top: auto;
    padding-top: 20px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }
  .course-cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    color: var(--color-primary);
    font-size: 15px;
    font-weight: 500;
    line-height: 22px;
    text-decoration: none;
    transition: gap 250ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  .course-card:hover .course-cta { gap: 14px; }

  .course-cta-arrow {
    width: 15px; height: 15px;
    display: block; flex-shrink: 0;
    transition: transform 250ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  .course-card:hover .course-cta-arrow { transform: translate(2px, -2px); }

  /* ── CONTENT TYPE LABEL ─────────────────────── */
  .card-bm-btn {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 8px 10px;
    border-radius: 100px;
    background: var(--pill-bg, rgba(238, 224, 195, 0.30));
    border: none; cursor: default; z-index: 4; flex-shrink: 0;
  }
  .card-bm-btn svg {
    width: 14px; height: 14px;
    stroke: #304642;
    fill: none;
  }
  .card-bm-btn.is-bookmarked svg {
    fill: #304642;
  }

  /* ── CATALOG HEADER ─────────────────────────── */
  /* (hero removed; section label lives inside content-card) */

  /* ── BOOKMARKS SECTION ──────────────────────── */
  #bm-section { display: none; }

  /* ── RESPONSIVE ─────────────────────────────── */
  @media (max-width: 900px) {
    .hero-header { margin: 16px 24px 16px; padding: 40px; min-height: auto; }
    .hero-title { font-size: 28px; line-height: 36px; }
    .hero-description { font-size: 16px; }
    .hero-checklist { display: none; }
    .content-area { padding: 16px 24px 32px; }
  }
  @media (max-width: 600px) {
    .header { padding: 12px 20px; }
    .nav { display: none; }
    .hero-header { margin: 12px 16px; padding: 32px 24px; }
    .content-area { padding: 16px 16px 24px; }
    .course-title { font-size: 19px; line-height: 28px; }
    .course-description { font-size: 14px; line-height: 22px; }
  }

  a:focus-visible, button:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }
  .course-card:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 4px; }

  /* ── CONTENT CARD ENTRANCE ─────────────────── */
  .content-area > .content-card {
    transition: opacity 0.55s cubic-bezier(0.22, 1, 0.36, 1) 0.18s, transform 0.55s cubic-bezier(0.22, 1, 0.36, 1) 0.18s;
  }
  .content-area > .content-card:nth-child(2) {
    transition-delay: 0.3s;
  }
  @starting-style {
    .content-area > .content-card {
      opacity: 0;
      transform: translateY(14px);
    }
  }

  /* ── SECTION LABEL ICON ENTRANCE ────────────── */
  .section-label-icon {
    animation: iconPop 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.28s both;
  }
  @keyframes iconPop {
    from { transform: scale(0.55); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  /* ── GRID FADE ON TAB FILTER ────────────────── */
  #paths-grid {
    transition: opacity 0.15s ease, transform 0.15s cubic-bezier(0.22, 1, 0.36, 1);
  }
  #paths-grid.grid-fading {
    opacity: 0;
    transform: translateY(7px);
  }

  /* ── LP CARD STACK ──────────────────────────── */
  /* box-shadow on the card itself: Y-offset = px below card bottom.
     Grid gap (20px) gives room for both layers to show. */
  .lp-stack-wrap {
    position: relative;
  }

  /* ── BOOKMARK POP ───────────────────────────── */
  @keyframes bmPop {
    0%   { transform: scale(1) rotate(0deg); }
    30%  { transform: scale(1.5) rotate(-12deg); }
    60%  { transform: scale(0.84) rotate(7deg); }
    82%  { transform: scale(1.1) rotate(-3deg); }
    100% { transform: scale(1) rotate(0deg); }
  }
  .course-bm-btn.bm-pop { animation: bmPop 0.44s cubic-bezier(0.22, 1, 0.36, 1); }

  /* ── LOCK SHAKE ON HOVER ────────────────────── */
  @keyframes lockShake {
    0%, 100% { transform: rotate(0deg); }
    15%  { transform: rotate(-9deg); }
    35%  { transform: rotate(9deg); }
    55%  { transform: rotate(-7deg); }
    75%  { transform: rotate(7deg); }
    90%  { transform: rotate(-2deg); }
  }
  .course-card.is-soon:hover .soon-card-lock {
    animation: lockShake 0.46s cubic-bezier(0.22, 1, 0.36, 1);
  }

  /* ── PATH FILTER TABS ── */
  .path-tabs {
    display: inline-flex; align-items: center; gap: 3px;
    background: rgba(255,255,255,0.95); border-radius: 100px;
    padding: 8px 10px;
    box-shadow: 0 0 0 1px rgba(48,70,66,0.07), 0 1px 4px rgba(48,70,66,0.04);
    transition: box-shadow 0.4s cubic-bezier(0.16,1,0.3,1);
  }

  .path-tab {
    position: relative; display: inline-flex; flex-direction: row;
    align-items: center; gap: 13px;
    padding: 10px 20px; border: none; border-radius: 100px; flex-shrink: 0;
    background: transparent; cursor: pointer; font-family: var(--font-family);
    transition: background 0.2s cubic-bezier(0.22,1,0.36,1);
    outline: none;
  }
  .path-tab.is-active { background: var(--sol-bg); }
  .path-tab:hover:not(.is-active) { background: oklch(0.96 0.005 165); }
  .path-tab:focus-visible { box-shadow: 0 0 0 2px var(--sol-color, var(--color-primary)); }
  .path-tab:active { transform: scale(0.97) !important; transition-duration: 0.08s !important; }
  .path-tab.is-active { animation: sol-btn-pop 0.4s cubic-bezier(0.16,1,0.3,1) both; }

  .path-tab .sol-btn-icon {
    width: 26px; height: 26px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: oklch(0.70 0.012 165);
    transition: color 0.2s cubic-bezier(0.22,1,0.36,1);
  }
  .path-tab .sol-btn-icon svg { width: 100%; height: 100%; display: block; }
  .path-tab.is-active .sol-btn-icon { color: var(--sol-color); }
  .path-tab:hover:not(.is-active) .sol-btn-icon { color: oklch(0.48 0.02 165); }

  .path-tab .sol-btn-name {
    font-size: 9.5px; font-weight: 400; letter-spacing: 0.07em;
    text-transform: uppercase; white-space: nowrap; line-height: 1;
    color: oklch(0.62 0.010 165);
    transition: color 0.2s cubic-bezier(0.22,1,0.36,1);
  }
  .path-tab.is-active .sol-btn-name { color: var(--sol-color); }
  .path-tab .sol-btn-tag {
    font-size: 14px; font-weight: 400; white-space: nowrap; line-height: 1.2;
    color: oklch(0.40 0.04 165);
    transition: color 0.2s cubic-bezier(0.22,1,0.36,1);
  }
  .path-tab.is-active .sol-btn-tag { color: oklch(0.28 0.06 165); font-weight: 700; }
  .path-tab:hover:not(.is-active) .sol-btn-tag { color: oklch(0.32 0.05 165); }

  /* Catalog section header layout */
  .catalog-header {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .path-tabs-wrap {
    overflow-x: auto;
    overflow-y: visible;
    scrollbar-width: none;
    padding: 4px 2px;
  }
  .path-tabs-wrap::-webkit-scrollbar { display: none; }

  /* LP mask icon for section headings */
  .lp-mask-icon {
    background-color: #304642;
    -webkit-mask-image: url('SVGs/Learning-Path.svg');
    mask-image: url('SVGs/Learning-Path.svg');
    -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
    -webkit-mask-position: center; mask-position: center;
    -webkit-mask-size: contain; mask-size: contain;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }

  /* ── LP DECK (multi-path per topic) — fanned card carousel ── */
  /* Single-path: a lone in-flow card. Multi-path: a fanned stack. */
  .lp-deck-stage { position: relative; }

  .lp-deck {
    position: relative;
    perspective: 1600px;
    view-transition-name: learning-card; /* whole deck morphs on TOPIC switch */
  }
  .lp-deck .learning-card {
    position: absolute;
    top: 50%; left: 50%;
    width: 100%;
    margin: 0;
    transform: translate(-50%, -50%);
    transform-origin: center center;
    transition: transform 0.55s cubic-bezier(0.16,1,0.3,1),
                opacity 0.45s cubic-bezier(0.16,1,0.3,1),
                filter 0.45s ease,
                translate 0.4s cubic-bezier(0.16,1,0.3,1);
    will-change: transform, opacity;
    view-transition-name: none; /* the wrapper carries the name, not each card */
    backface-visibility: hidden;
  }
  .lp-deck .learning-card.is-side { cursor: pointer; }
  .lp-deck .learning-card.is-side:hover {
    opacity: 1 !important;
  }
  /* nudge left-peeking cards further left, right-peeking cards further right */
  .lp-deck .learning-card.is-left:hover  { translate: -8px 0; }
  .lp-deck .learning-card.is-right:hover { translate:  8px 0; }
  /* hide content on peeking cards — only the card background shows */
  .lp-deck .learning-card .lc-inner {
    transition: opacity 0.3s cubic-bezier(0.16,1,0.3,1);
  }
  .lp-deck .learning-card.is-side .lc-inner {
    opacity: 0;
    pointer-events: none;
  }

  /* Side navigation arrows */
  .lp-deck-arrow {
    position: absolute;
    top: 50%;
    z-index: 50;
    width: 44px; height: 44px;
    transform: translateY(-50%);
    display: flex; align-items: center; justify-content: center;
    border: none; border-radius: 50%;
    background: var(--color-primary);
    color: #fff;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(48,70,66,0.22);
    transition: transform 0.28s cubic-bezier(0.16,1,0.3,1),
                background 0.2s ease, opacity 0.2s ease, box-shadow 0.28s ease;
  }
  .lp-deck-arrow svg { width: 18px; height: 18px; }
  /* arrows straddle the front card's vertical edges */
  .lp-deck-arrow.is-prev { left: -22px; }
  .lp-deck-arrow.is-next { right: -22px; }
  .lp-deck-arrow:hover:not(:disabled) {
    background: var(--color-primary-light);
    box-shadow: 0 8px 22px rgba(48,70,66,0.28);
  }
  .lp-deck-arrow.is-prev:hover:not(:disabled) { transform: translateY(-50%) translateX(-2px); }
  .lp-deck-arrow.is-next:hover:not(:disabled) { transform: translateY(-50%) translateX(2px); }
  .lp-deck-arrow:active:not(:disabled) { transform: translateY(-50%) scale(0.93); }
  .lp-deck-arrow:disabled { opacity: 0; pointer-events: none; }
  .lp-deck-arrow:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 3px; }

  /* Caption + dots below the deck */
  .lp-deck-foot {
    display: flex; flex-direction: column; align-items: center; gap: 9px;
    margin-top: 22px;
  }
  .lp-deck-caption {
    font-size: 11px; font-weight: 500; letter-spacing: 0.01em;
    color: var(--color-muted);
  }
  .lp-deck-dots {
    display: flex; align-items: center; gap: 6px;
  }
  .lc-lp-dot {
    height: 6px; width: 6px; border-radius: 4px;
    background: rgba(48,70,66,0.16);
    border: none; padding: 0; cursor: pointer;
    transition: width 0.28s cubic-bezier(0.16,1,0.3,1), background 0.28s;
  }
  .lc-lp-dot:hover { background: rgba(48,70,66,0.3); }
  .lc-lp-dot.is-active { width: 20px; cursor: default; }
  .lc-lp-dot:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 3px; }

  /* "Recommended" badge — in flow, left-aligned with the title */
  .lc-rec-badge {
    align-self: flex-start;
    display: inline-flex; align-items: center; gap: 6px;
    margin-bottom: 14px;
    padding: 5px 12px 5px 10px; border-radius: 100px;
    background: rgba(255,90,0,0.10);
    color: var(--color-primary);
    font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
  }
  .lc-rec-badge svg { width: 13px; height: 13px; color: var(--color-accent); }

  @media (prefers-reduced-motion: reduce) {
    .lp-deck .learning-card { transition-duration: 0.001s; }
    .lp-deck-arrow { transition-duration: 0.001s; }
  }

  @media (max-width: 640px) {
    /* hide the back-card peek; navigate via arrows + dots only */
    .lp-deck .learning-card.is-side { opacity: 0 !important; pointer-events: none; }
    .lp-deck-arrow.is-prev { left: 4px; }
    .lp-deck-arrow.is-next { right: 4px; }
  }

  /* ══════════════════════════════════════
     HOME v2 — SOLUTION TOGGLE + LEARNING CARD
     ══════════════════════════════════════ */
  .sol-main {
    flex: 1; max-width: 1200px; width: 100%;
    margin: 0 auto; padding: 18px 48px 80px;
    display: flex; flex-direction: column; gap: 16px;
  }

  .sol-toggle-wrap {
    display: flex; justify-content: center;
    overflow-x: auto; overflow-y: visible; scrollbar-width: none; padding: 4px 2px;
    /* allow toggle to scroll rather than squish on narrow viewports */
    -webkit-overflow-scrolling: touch;
  }
  .sol-toggle-wrap::-webkit-scrollbar { display: none; }

  /* ── SOLUTION TOGGLE ── */
  /* ── SOLUTION TOGGLE ─ icon + text horizontal layout ── */
  .sol-toggle {
    display: inline-flex; align-items: center; gap: 3px;
    background: oklch(0.995 0.003 165 / 0.95);
    border-radius: 100px; padding: 8px 10px;
    box-shadow: 0 0 0 1px rgba(48,70,66,0.07), 0 1px 4px rgba(48,70,66,0.04);
    transition: box-shadow 0.3s cubic-bezier(0.16,1,0.3,1);
  }

  .sol-btn {
    position: relative; display: inline-flex; flex-direction: row;
    align-items: center; gap: 13px;
    padding: 10px 20px; border-radius: 100px; border: none; flex-shrink: 0;
    background: transparent; cursor: pointer; font-family: var(--font-family);
    transition: background 0.2s cubic-bezier(0.22,1,0.36,1);
  }
  .sol-btn.is-active { background: var(--sol-bg); }
  .sol-btn:hover:not(.is-active) { background: oklch(0.96 0.005 165); }
  .sol-btn:active { transform: scale(0.97) !important; transition-duration: 0.08s !important; }

  /* Icon */
  .sol-btn-icon {
    width: 26px; height: 26px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: oklch(0.70 0.012 165);
    transition: color 0.2s cubic-bezier(0.22,1,0.36,1);
  }
  .sol-btn-icon svg { width: 100%; height: 100%; display: block; }
  .sol-btn.is-active .sol-btn-icon { color: var(--sol-color); }
  .sol-btn:hover:not(.is-active) .sol-btn-icon { color: oklch(0.48 0.02 165); }

  /* Text block */
  .sol-btn-text { display: flex; flex-direction: column; gap: 2px; text-align: left; }
  .sol-btn-name {
    font-size: 9.5px; font-weight: 400; letter-spacing: 0.07em;
    text-transform: uppercase; white-space: nowrap; line-height: 1;
    color: oklch(0.62 0.010 165);
    transition: color 0.2s cubic-bezier(0.22,1,0.36,1);
  }
  .sol-btn.is-active .sol-btn-name { color: var(--sol-color); }
  .sol-btn-tag {
    font-size: 14px; font-weight: 400; white-space: nowrap; line-height: 1.2;
    color: oklch(0.40 0.04 165);
    transition: color 0.2s cubic-bezier(0.22,1,0.36,1);
  }
  .sol-btn.is-active .sol-btn-tag  { color: oklch(0.28 0.06 165); font-weight: 700; }
  .sol-btn:hover:not(.is-active) .sol-btn-tag { color: oklch(0.32 0.05 165); }

  /* ── Learning card shell ── */
  .learning-card {
    border-radius: 22px; border: 1px solid transparent; overflow: hidden;
    transition: background-color 350ms cubic-bezier(0.16,1,0.3,1),
                border-color 350ms cubic-bezier(0.16,1,0.3,1);
    view-transition-name: learning-card;
  }

  @media (prefers-reduced-motion: no-preference) {
    @keyframes lc-out { to { opacity:0; transform:scale(0.97); filter:blur(4px); } }
    @keyframes lc-in  { from { opacity:0; transform:scale(0.97) translateY(10px); filter:blur(4px); } }
    ::view-transition-old(learning-card) { animation: 180ms ease-in lc-out both; }
    ::view-transition-new(learning-card) { animation: 420ms cubic-bezier(0.16,1,0.3,1) lc-in both; }
    ::view-transition-old(root), ::view-transition-new(root) { animation: none; mix-blend-mode: normal; }
  }

  .lc-inner {
    display: flex; flex-direction: row; align-items: stretch;
  }

  .lc-left {
    flex: 1; min-width: 0;
    padding: 52px 52px 48px;
    display: flex; flex-direction: column;
  }

  .lc-illu-wrap {
    flex-shrink: 0; align-self: center;

function getProgress(path) {
  if (!path.courseIds || !path.courseIds.length) return { done: 0, total: 0, pct: 0, started: false };
  const total = path.courseIds.length;
  let done = 0, totalProgress = 0;
  for (const cid of path.courseIds) {
    const raw = localStorage.getItem('course_progress_' + cid);
    if (raw) {
      try {
        const data = JSON.parse(raw);
        if (data.completed) { done++; totalProgress += 100; }
        else { totalProgress += (data.progress || 0); }
      } catch { if (raw === 'completed') { done++; totalProgress += 100; } }
    }
  }
  return { done, total, pct: Math.round(totalProgress / total), started: totalProgress > 0 };
}

function getActivePath() {
  let best = null, bestPct = 0;
  for (const p of PATHS) {
    if (p.comingSoon) continue;
    const g = getProgress(p);
    if (g.started && g.pct < 100 && g.pct > bestPct) { best = p; bestPct = g.pct; }
  }
  if (!best) { for (const p of PATHS) { if (!p.comingSoon && p.courseIds.length) { best = p; break; } } }
  return best;
}

function initBloomBtn(btn) {
  if (!btn || window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  if (btn._bloomCleanup) btn._bloomCleanup();

  const setOrigin = (e) => {
    const r = btn.getBoundingClientRect();
    const x = Math.max(0, Math.min(100, (e.clientX - r.left) / r.width * 100)).toFixed(1);
    const y = Math.max(0, Math.min(100, (e.clientY - r.top)  / r.height * 100)).toFixed(1);
    btn.style.setProperty('--bloom-x', x + '%');
    btn.style.setProperty('--bloom-y', y + '%');
  };

  const onEnter  = (e) => { setOrigin(e); btn.classList.add('is-blooming'); };
  const onMove   = (e) => { setOrigin(e); };
  const onLeave  = (e) => { setOrigin(e); btn.classList.remove('is-blooming'); };

  btn.addEventListener('mouseenter', onEnter);
  btn.addEventListener('mousemove',  onMove);
  btn.addEventListener('mouseleave', onLeave);

  btn._bloomCleanup = () => {
    btn.removeEventListener('mouseenter', onEnter);
    btn.removeEventListener('mousemove',  onMove);
    btn.removeEventListener('mouseleave', onLeave);
  };
}

function initCardParallax(card) {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  if (card._parallaxCleanup) card._parallaxCleanup();
  const illuWrap = card.querySelector('.lc-illu-wrap');
  if (!illuWrap) return;
  const onMove = (e) => {
    const r = card.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width  - 0.5;
    const y = (e.clientY - r.top)  / r.height - 0.5;
    illuWrap.style.transform = `translate(${x * 14}px, ${y * 9}px)`;
  };
  const onLeave = () => { illuWrap.style.transform = ''; };
  card.addEventListener('mousemove', onMove);
  card.addEventListener('mouseleave', onLeave);
  card._parallaxCleanup = () => {
    card.removeEventListener('mousemove', onMove);
    card.removeEventListener('mouseleave', onLeave);
  };
}

    renderLearningCard(pid, { card: cardEl, recommended: idx === 0 });

  // Click a non-active (side/back) card to bring it to center; intercept its links.
  deck.addEventListener('click', e => {
    const cardEl = e.target.closest('.learning-card');
    if (!cardEl) return;

  // Arrows
  wrap.querySelector('.lp-deck-arrow.is-prev').addEventListener('click', () => switchLp((activeLpIndexes[activeSolKey] || 0) - 1));

  wrap.querySelectorAll('.lc-lp-dot').forEach(dot => {
    dot.addEventListener('click', () => switchLp(parseInt(dot.dataset.lpIdx, 10)));

  // Keyboard on the deck
  deck.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  { e.preventDefault(); switchLp((activeLpIndexes[activeSolKey] || 0) - 1); }
    if (e.key === 'ArrowRight') { e.preventDefault(); switchLp((activeLpIndexes[activeSolKey] || 0) + 1); }
  });

  // Defer so cards have painted and have their natural heights.
  requestAnimationFrame(() => requestAnimationFrame(() => layoutDeck()));
}

// Position every card in the fanned deck relative to the active index.
function layoutDeck() {
  const wrap = document.getElementById('lp-deck-wrap');
  const deck = wrap && wrap.querySelector('.lp-deck');
  if (!deck) return;
  const sol = SOLUTIONS.find(s => s.key === activeSolKey);
  const cards = Array.from(deck.querySelectorAll('.learning-card'));
  const total = cards.length;
  const activeIdx = activeLpIndexes[activeSolKey] || 0;

  // Measure the active card's natural height first — back cards will match it.
  const activeCard = cards.find(c => parseInt(c.dataset.lpIdx, 10) === activeIdx);
  if (activeCard) { activeCard.style.height = ''; activeCard.style.overflow = ''; }
  const activeH = activeCard ? activeCard.offsetHeight : 0;

  cards.forEach(cardEl => {
    const idx = parseInt(cardEl.dataset.lpIdx, 10);
    // offset < 0 → peeks left, offset > 0 → peeks right, 0 → front
    const offset = idx - activeIdx;
    const abs = Math.abs(offset);
    let tx, opacity, z, side = false, hidden = false;
    if (offset === 0) {
      tx = 0; opacity = 1; z = 30;
      cardEl.style.height = '';
      cardEl.style.overflow = '';
    } else if (abs <= 2) {
      tx = offset * 3.5;                    // negative = left, positive = right
      opacity = abs === 1 ? 0.6 : 0.35;
      z = 30 - abs;
      side = true;
      if (activeH) { cardEl.style.height = activeH + 'px'; cardEl.style.overflow = 'hidden'; }
    } else {
      tx = 0; opacity = 0; z = 10; hidden = true;
    }
    cardEl.style.transform = `translate(calc(-50% + ${tx}%), -50%)`;
    cardEl.style.opacity = opacity;
    cardEl.style.filter = 'none';
    cardEl.style.zIndex = z;
    cardEl.classList.toggle('is-side', side);
    cardEl.classList.toggle('is-left',  side && offset < 0);
    cardEl.classList.toggle('is-right', side && offset > 0);
    cardEl.style.pointerEvents = hidden ? 'none' : 'auto';
    cardEl.setAttribute('aria-hidden', hidden ? 'true' : 'false');
    cardEl.inert = hidden;
  });

  if (activeH) deck.style.height = activeH + 'px';

  // Refresh dots
  wrap.querySelectorAll('.lc-lp-dot').forEach(dot => {
    const i = parseInt(dot.dataset.lpIdx, 10);
    const on = i === activeIdx;
    dot.classList.toggle('is-active', on);
    dot.style.background = on ? 'var(--color-primary)' : '';
  });

  // Refresh arrow bounds
  const prev = wrap.querySelector('.lp-deck-arrow.is-prev');
  const next = wrap.querySelector('.lp-deck-arrow.is-next');
  if (prev) prev.disabled = activeIdx <= 0;
  if (next) next.disabled = activeIdx >= total - 1;
}

function wireCards() {
  document.querySelectorAll('.course-card[data-href]').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('[data-bm]') || e.target.closest('a')) return;
      sessionStorage.setItem('hub-origin', 'catalog');
      window.location.href = card.getAttribute('data-href');
    });
    card.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        sessionStorage.setItem('hub-origin', 'catalog');
        window.location.href = card.getAttribute('data-href');
      }
    });
    card.querySelectorAll('a[href]').forEach(link => {
      link.addEventListener('click', () => sessionStorage.setItem('hub-origin', 'catalog'));
    });
  });
}

function observeCards() {
  const cards = document.querySelectorAll('.course-card:not(.visible)');
  if (!('IntersectionObserver' in window) || window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    cards.forEach(c => c.classList.add('visible')); return;
  }
  try {
    const obs = new IntersectionObserver((entries, o) => {
      entries.forEach(entry => { if (entry.isIntersecting) { entry.target.classList.add('visible'); o.unobserve(entry.target); } });
    }, { rootMargin: '0px 0px 480px 0px', threshold: 0.01 });
    cards.forEach(c => obs.observe(c));
    requestAnimationFrame(() => {
      const vh = window.innerHeight;
      cards.forEach(c => { if (!c.classList.contains('visible')) { const r = c.getBoundingClientRect(); if (r.top < vh + 500) c.classList.add('visible'); } });
    });
  } catch { cards.forEach(c => c.classList.add('visible')); }
}

// ── HERO PARALLAX ─────────────────────────────────────────────
(function() {
  const noMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const hasHover = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
  if (noMotion || !hasHover) return;

  let tx = 0, ty = 0, cx = 0, cy = 0, rafId = null;

  function tick() {
    const LERP = 0.075;
    cx += (tx - cx) * LERP;
    cy += (ty - cy) * LERP;

    const grid = document.querySelector('.hero-grid-layer');
    const content = document.querySelector('#home-hero .hero-content');
    const checklist = document.querySelector('#home-hero .hero-checklist');

    if (grid)     grid.style.transform     = `translate(${cx * -18}px, ${cy * -12}px)`;
    if (content)  content.style.transform  = `translate(${cx * 7}px,  ${cy * 4}px)`;
    if (checklist) checklist.style.transform = `translate(${cx * 16}px, ${cy * 10}px)`;

    const stillMoving = Math.abs(tx - cx) > 0.0005 || Math.abs(ty - cy) > 0.0005
                     || Math.abs(cx) > 0.0005 || Math.abs(cy) > 0.0005;
    rafId = stillMoving ? requestAnimationFrame(tick) : null;
  }

  function start() { if (!rafId) rafId = requestAnimationFrame(tick); }

  document.getElementById('home-hero').addEventListener('mousemove', e => {
    const r = e.currentTarget.getBoundingClientRect();
    tx = ((e.clientX - r.left) / r.width  - 0.5) * 2;
    ty = ((e.clientY - r.top)  / r.height - 0.5) * 2;
    start();
  });

  document.getElementById('home-hero').addEventListener('mouseleave', () => {
    tx = 0; ty = 0; start();
  });
})();

    </div>`;
  document.body.appendChild(el);

  const pop      = el;
  const popClose = el.querySelector('.share-pop-close');
  const popName  = el.querySelector('.share-pop-name');
  const urlField = el.querySelector('.share-url-field');
  const copyBtn  = el.querySelector('.share-copy-btn');
  let activeTrigger = null;

  function positionPop(trigger) {
    const r = trigger.getBoundingClientRect(), pw = 320, gap = 8;
    let top = r.bottom + gap, left = r.right - pw;
    if (left < 12) left = 12;
    if (left + pw > window.innerWidth - 12) left = window.innerWidth - 12 - pw;
    const ph = pop.offsetHeight || 260;
    if (top + ph > window.innerHeight - 12) top = r.top - gap - ph;
    pop.style.top = top + 'px'; pop.style.left = left + 'px';
  }

  function closePop() {
    pop.classList.remove('is-open');
    if (activeTrigger) { activeTrigger.focus(); activeTrigger = null; }
  }

  window.openSharePop = function(trigger, name, url) {
    activeTrigger = trigger;
    popName.textContent = name;
    urlField.value = url;
    copyBtn.innerHTML = 'Copy link';
    copyBtn.classList.remove('is-copied');
    // re-trigger entrance animations on every open
    pop.classList.remove('is-open');
    void pop.offsetHeight;
    pop.classList.add('is-open');
    positionPop(trigger);
    requestAnimationFrame(() => popClose.focus());
  };

  popClose.addEventListener('click', closePop);

  copyBtn.addEventListener('click', () => {
    copyBtn.classList.add('is-copied');
    copyBtn.innerHTML = `<svg class="sp-check" viewBox="0 0 20 20" fill="none"><polyline class="sp-check-line" points="4,10 8,14 16,6"/></svg>`;
    setTimeout(() => { copyBtn.innerHTML = 'Copy link'; copyBtn.classList.remove('is-copied'); }, 1600);
  });

  // Radial glow follows cursor on channel buttons
  el.querySelectorAll('.share-ch-btn').forEach(btn => {
    btn.addEventListener('mousemove', e => {
      const r = btn.getBoundingClientRect();
      btn.style.setProperty('--gx', ((e.clientX - r.left) / r.width * 100).toFixed(1) + '%');
      btn.style.setProperty('--gy', ((e.clientY - r.top) / r.height * 100).toFixed(1) + '%');
    });
  });

  document.addEventListener('mousedown', e => {
    if (!pop.classList.contains('is-open')) return;
    if (pop.contains(e.target)) return;
    if (activeTrigger && activeTrigger.contains(e.target)) return;
    closePop();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && pop.classList.contains('is-open')) { e.preventDefault(); closePop(); }
  });
})();

      sessionStorage.setItem(KEY, anchor.querySelector('.cw-panel') ? '1' : '0');
    });
    obs.observe(anchor, { childList: true, subtree: true });
  });
})();
</script>
