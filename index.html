<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Inact — Learning prototypes</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #304642;
      --color-primary-light: #3d5a54;
      --color-accent: #FF5A00;
      --color-bg: #FAFAFA;
      --color-card-bg: #FFFFFF;
      --color-muted: #8A9A97;
      --color-text-secondary: rgba(48, 70, 66, 0.6);
      --font-family: 'Poppins', sans-serif;
      --shadow-card: 0 2px 8px rgba(48, 70, 66, 0.06), 0 8px 24px rgba(48, 70, 66, 0.08);
      --shadow-card-hover: 0 8px 16px rgba(48, 70, 66, 0.08), 0 24px 48px rgba(48, 70, 66, 0.12);
      --radius-lg: 20px;
      --transition-smooth: cubic-bezier(0.4, 0, 0.2, 1);
      --page-margin: 40px;
      --page-margin-top: 20px;
    }

    @media (min-width: 1400px) {
      :root { --page-margin: 120px; }
    }
    @media (min-width: 1600px) {
      :root { --page-margin: 180px; }
    }
    @media (min-width: 1920px) {
      :root { --page-margin: 280px; }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-family);
      background: var(--color-bg);
      min-height: 100vh;
      color: var(--color-primary);
      background-image: radial-gradient(circle at 1px 1px, rgba(48, 70, 66, 0.03) 1px, transparent 0);
      background-size: 24px 24px;
    }

    .hero-header {
      background:
        linear-gradient(to right, rgba(255, 255, 255, 0.06) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.06) 1px, transparent 1px),
        var(--color-primary);
      background-size: 120px 120px, 120px 120px, 100% 100%;
      border-radius: 25px;
      margin: var(--page-margin-top) var(--page-margin) 28px;
      padding: 40px 48px;
      box-shadow:
        0 18px 48px rgba(0, 0, 0, 0.18),
        0 2px 10px rgba(0, 0, 0, 0.10);
    }

    .hero-title {
      color: #fff;
      font-size: 32px;
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.6px;
      margin-bottom: 10px;
    }

    .hero-description {
      color: rgba(255, 255, 255, 0.88);
      font-size: 17px;
      font-weight: 300;
      line-height: 1.45;
      max-width: 520px;
    }

    .nav-wrap {
      margin: 0 var(--page-margin) 48px;
    }

    .nav-grid {
      display: grid;
      gap: 20px;
      max-width: 900px;
    }

    @media (min-width: 720px) {
      .nav-grid {
        max-width: none;
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .nav-tile {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: space-between;
      min-height: 140px;
      padding: 24px 22px;
      background: var(--color-card-bg);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      text-decoration: none;
      color: var(--color-primary);
      border: 1px solid rgba(48, 70, 66, 0.06);
      transition: transform 0.2s var(--transition-smooth), box-shadow 0.2s var(--transition-smooth);
    }

    .nav-tile:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-card-hover);
    }

    .nav-tile-title {
      font-size: 17px;
      font-weight: 600;
      line-height: 1.35;
      letter-spacing: -0.2px;
    }

    .nav-tile-arrow {
      margin-top: 16px;
      font-size: 15px;
      font-weight: 600;
      color: var(--color-accent);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
  </style>
</head>
<body>
  <header class="hero-header">
    <h1 class="hero-title">Inact learning paths</h1>
    <p class="hero-description">Prototype navigation. Choose a path to open its hub.</p>
  </header>

  <main class="nav-wrap">
    <div class="nav-grid">
      <a class="nav-tile" href="hub.html">
        <span class="nav-tile-title">Inact for inventory management</span>
        <span class="nav-tile-arrow">Open learning path →</span>
      </a>
      <a class="nav-tile" href="supplier-hub.html">
        <span class="nav-tile-title">Inact for supplier management</span>
        <span class="nav-tile-arrow">Open learning path →</span>
      </a>
      <a class="nav-tile" href="now-hub.html">
        <span class="nav-tile-title">Inact Now fundamentals</span>
        <span class="nav-tile-arrow">Open learning path →</span>
      </a>
    </div>
  </main>
</body>
</html>
