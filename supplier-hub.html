<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Learning Path - Supplier Management with Inact Now</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @property --bloom-r {
      syntax: '<percentage>';
      inherits: true;
      initial-value: 0%;
    }

    :root {
      --color-primary: #304642;
      --color-primary-light: #3d5a54;
      --color-accent: #FF5A00;
      --color-accent-glow: rgba(255, 90, 0, 0.25);
      --color-bg: #F9F7F5;
      --color-card-bg: #FFFFFF;
      --color-muted: #8A9A97;
      --color-text-secondary: rgba(48, 70, 66, 0.6);
      --color-tag-bg: #F0F0F0;
      --color-progress-bg: #EBEBEB;
      --color-sidebar-bg: linear-gradient(180deg, #FFFFFF 0%, #F8FAF9 100%);
      --font-family: 'Poppins', sans-serif;
      --shadow-card: 0 2px 8px rgba(48, 70, 66, 0.06), 0 8px 24px rgba(48, 70, 66, 0.08);
      --shadow-card-hover: 0 8px 16px rgba(48, 70, 66, 0.08), 0 24px 48px rgba(48, 70, 66, 0.12);
      --shadow-header: 0 1px 0 rgba(48, 70, 66, 0.06);
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --transition-smooth: cubic-bezier(0.4, 0, 0.2, 1);
      --page-margin: 60px;
      --page-margin-top: 20px;
    }

    @media (min-width: 1400px) {
      :root {
        --page-margin: 160px;
        --page-margin-top: 20px;
      }
    }

    @media (min-width: 1600px) {
      :root {
        --page-margin: 220px;
        --page-margin-top: 20px;
      }
    }

    @media (min-width: 1920px) {
      :root {
        --page-margin: 320px;
        --page-margin-top: 20px;
      }
    }

    @media (min-width: 2200px) {
      :root {
        --page-margin: 420px;
        --page-margin-top: 20px;
      }
    }

    @media (min-width: 2560px) {
      :root {
        --page-margin: 520px;
        --page-margin-top: 20px;
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-family);
      background: var(--color-bg);
      min-height: 100vh;
      color: var(--color-primary);
      background-image: radial-gradient(circle at 1px 1px, rgba(48, 70, 66, 0.03) 1px, transparent 0);
      background-size: 24px 24px;
    }

    .hero-header {
      background-color: #FDFCFF;
      background-image: radial-gradient(circle, rgba(0,0,0,0.07) 1px, transparent 1px);
      background-size: 20px 20px;
      border: 1px solid #D8D0E8;
      border-radius: 25px;
      margin: var(--page-margin-top) var(--page-margin) 20px;
      padding: 47px 63px;
      position: relative;
      overflow: hidden;
      min-height: 280px;
      box-shadow: 0 2px 12px rgba(48, 70, 66, 0.07);
    }

    .hero-graphs {
      position: absolute;
      right: 56px;
      top: 50%;
      transform: translateY(-50%);
      width: min(32%, 300px);
      height: auto;
      pointer-events: none;
      user-select: none;
      z-index: 1;
      display: block;
      mix-blend-mode: multiply;
    }

    .hero-progress {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      min-width: 120px;
      max-width: 260px;
    }

    .hero-progress-track {
      flex: 1;
      height: 5px;
      background: rgba(0, 0, 0, 0.08);
      border: none;
      border-radius: 500px;
      overflow: hidden;
      position: relative;
    }

    .hero-progress-fill {
      height: 100%;
      width: 0%;
      background: var(--color-primary);
      border-radius: 500px;
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .hero-progress-label {
      color: #221D2E;
      font-size: 12px;
      font-weight: 600;
      line-height: 1;
      white-space: nowrap;
      transition: opacity 0.4s ease;
    }

    .hero-content {
      width: min(520px, 100%);
      display: inline-flex;
      flex-direction: column;
      gap: 31px;
      position: relative;
      z-index: 2;
    }

    .hero-tags {
      display: inline-flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .glass {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(7px);
      -webkit-backdrop-filter: blur(7px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.5),
        inset 0 -1px 0 rgba(255, 255, 255, 0.1),
        inset 0 0 0px 0px rgba(255, 255, 255, 0);
      position: relative;
        overflow: hidden;
    }

    .glass::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.8),
        transparent
      );
      pointer-events: none;
    }

    .glass::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 1px;
        height: 100%;
      background: linear-gradient(
        180deg,
        rgba(255, 255, 255, 0.8),
        transparent,
        rgba(255, 255, 255, 0.3)
      );
      pointer-events: none;
    }

    .glass > * {
      position: relative;
      z-index: 1;
    }

    .hero-tag {
      padding: 9px 21px;
      border-radius: 500px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #221D2E;
      font-size: 14px;
      font-weight: 400;
      line-height: 20px;
      word-wrap: break-word;
      background: rgba(225, 219, 235, 0.30);
      border: none;
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }

    .hero-tag.primary {
      font-weight: 700;
    }

    /* Override glass for light purple theme */
    .hero-header .glass {
      background: rgba(225, 219, 235, 0.30) !important;
      border: none !important;
      box-shadow: none !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
    }
    .hero-header .glass::before,
    .hero-header .glass::after { display: none; }

    .hero-tag-icon {
      width: 16px;
      height: 15px;
      display: block;
      flex-shrink: 0;
      background-color: #304642;
      -webkit-mask-image: url('SVGs/Learning-Path.svg');
      mask-image: url('SVGs/Learning-Path.svg');
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
      -webkit-mask-position: center;
      mask-position: center;
      -webkit-mask-size: contain;
      mask-size: contain;
    }

    .hero-text {
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .hero-title {
      color: var(--color-primary);
      font-size: 32px;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.03em;
      word-wrap: break-word;
    }

    .hero-description {
      color: rgba(34, 29, 46, 0.6);
      font-size: 20px;
      font-weight: 300;
      line-height: 27px;
      max-width: 470px;
      word-wrap: break-word;
    }

    /* ── Back button ── */
    .back-btn-wrap { margin: 16px var(--page-margin) 0; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px 7px 10px; border-radius: 100px;
      text-decoration: none;
      font-family: var(--font-family); font-size: 14px; font-weight: 500;
      color: #8A9A97; position: relative;
      transition: color 0.28s cubic-bezier(0.16,1,0.3,1),
                  transform 0.2s cubic-bezier(0.16,1,0.3,1);
    }
    .back-btn::before {
      content: ''; position: absolute; inset: 0; border-radius: 100px;
      background: rgba(48,70,66,0.06);
      transform: scale(0.82); opacity: 0;
      transition: transform 0.35s cubic-bezier(0.16,1,0.3,1), opacity 0.25s ease;
      pointer-events: none;
    }
    .back-btn:hover { color: #304642; }
    .back-btn:hover::before { transform: scale(1); opacity: 1; }
    .back-btn:active { transform: scale(0.95); transition-duration: 0.08s; }
    .back-chevron {
      display: inline-flex; flex-shrink: 0;
      transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
    }
    .back-btn:hover .back-chevron { transform: translateX(-4px); }

    .hero-actions {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .btn-start {
      padding: 9px 21px;
      background: #E1DBEB;
      border: 1.5px solid #CFC8DF;
      border-radius: 500px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: #221D2E;
      font-size: 17px;
      font-weight: 600;
      line-height: 24px;
      text-decoration: none;
      cursor: pointer;
      font-family: var(--font-family);
      position: relative; overflow: hidden;
      transition: transform 0.28s cubic-bezier(0.16,1,0.3,1),
                  box-shadow 0.28s cubic-bezier(0.16,1,0.3,1);
      word-wrap: break-word;
    }

    .btn-start:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(34, 29, 46, 0.18);
    }

    .btn-start-label {
      display: flex;
      flex-direction: column;
      justify-content: center;
      transition: transform 0.28s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .btn-start-arrow {
      width: 7px;
      height: 14px;
      background: #221D2E;
      -webkit-mask-image: url('SVGs/ButtonArrow.svg');
      mask-image: url('SVGs/ButtonArrow.svg');
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
      -webkit-mask-position: center;
      mask-position: center;
      -webkit-mask-size: contain;
      mask-size: contain;
      display: inline-block;
      flex: 0 0 auto;
      transition: transform 0.38s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .btn-start.is-blooming { --bloom-r: 170%; }

    @media (prefers-reduced-motion: no-preference) {
      .btn-start:hover .btn-start-label { transform: translateX(2px); }
      .btn-start:hover .btn-start-arrow { transform: translateX(8px); }
      .btn-start::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        pointer-events: none;
        background: radial-gradient(
          circle at var(--bloom-x, 50%) var(--bloom-y, 50%),
          rgba(255,255,255,0.30) var(--bloom-r),
          transparent calc(var(--bloom-r) + 14%)
        );
        transition: --bloom-r 0.55s cubic-bezier(0.16, 1, 0.3, 1);
      }
    }

    .btn-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 42px; height: 42px; padding: 0;
      border-radius: 500px; border: 1.5px solid rgba(48,70,66,0.15);
      background: transparent; cursor: pointer; color: var(--color-muted);
      transition: background 0.2s ease, transform 0.25s cubic-bezier(0.16,1,0.3,1), color 0.2s ease;
    }
    .btn-icon:hover {
      background: rgba(48,70,66,0.08);
      transform: translateY(-2px);
      color: var(--color-primary);
    }
    .btn-icon:active {
      transform: scale(0.93) translateY(0) !important;
      transition-duration: 0.08s !important;
    }
    .btn-icon svg {
      width: 16px; height: 16px; display: block;
      transition: transform 0.2s ease;
    }
    .btn-icon.is-bm { cursor: default; }
    .btn-icon.is-bm:hover svg { transform: rotate(-18deg) scale(1.18); }
    .btn-icon.is-share:hover svg { transform: rotate(14deg) scale(1.18); }

    /* ── SHARE POPOVER ─ overdrive B ────────────── */
    .share-pop { position: fixed; z-index: 9999; width: 320px; background: #FDFEFD; border-radius: 22px; box-shadow: 0 0 0 1px rgba(48,70,66,0.07), 0 4px 14px rgba(48,70,66,0.07), 0 20px 56px rgba(48,70,66,0.13); opacity: 0; transform: scale(0.96) translateY(-8px); transform-origin: top right; pointer-events: none; overflow: hidden; transition: opacity 0.2s cubic-bezier(0.22,1,0.36,1), transform 0.2s cubic-bezier(0.22,1,0.36,1); }
    .share-pop.is-open { opacity: 1; transform: scale(1) translateY(0); pointer-events: auto; }
    .share-pop.is-open .share-pop-head  { animation: sp-rise 0.3s cubic-bezier(0.22,1,0.36,1) 0.03s both; }
    .share-pop.is-open .share-pop-name  { animation: sp-left 0.28s cubic-bezier(0.22,1,0.36,1) 0.07s both; }
    .share-pop.is-open .share-pop-rule  { animation: sp-rule 0.24s ease-out 0.13s both; }
    .share-pop.is-open .share-actions { animation: sp-rise 0.25s cubic-bezier(0.22,1,0.36,1) 0.18s both; }
    @keyframes sp-rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes sp-left { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes sp-rule { from { transform: scaleX(0); transform-origin: left center; } to { transform: scaleX(1); transform-origin: left center; } }
    @media (prefers-reduced-motion: reduce) { .share-pop.is-open .share-pop-head, .share-pop.is-open .share-pop-name, .share-pop.is-open .share-pop-rule, .share-pop.is-open .share-scope-wrap, .share-pop.is-open .share-actions { animation: none; } }
    .share-pop-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px 10px; }
    .share-pop-label { font-size: 10.5px; font-weight: 700; letter-spacing: 1.2px; color: #9AADA9; }
    .share-pop-close { width: 28px; height: 28px; border: none; background: none; cursor: pointer; color: #9AADA9; display: flex; align-items: center; justify-content: center; border-radius: 9px; padding: 0; flex-shrink: 0; transition: background 0.15s, color 0.15s, transform 0.22s cubic-bezier(0.22,1,0.36,1); }
    .share-pop-close:hover { background: rgba(48,70,66,0.08); color: #304642; transform: rotate(90deg); }
    .share-pop-name { padding: 0 20px 16px; font-size: 15px; font-weight: 700; color: #1A2E2B; line-height: 1.3; letter-spacing: -0.2px; }
    .share-pop-rule { height: 1px; background: rgba(48,70,66,0.08); margin: 0 20px; }
    .share-actions { padding: 12px 20px 20px; display: flex; flex-direction: column; gap: 10px; }
    .share-action-btn { width: 100%; padding: 13px 20px; border-radius: 50px; border: none; font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 9px; transition: opacity 0.15s, transform 0.12s cubic-bezier(0.22,1,0.36,1); }
    .share-action-btn:active { transform: scale(0.97); }
    .share-action-btn svg { width: 17px; height: 17px; flex-shrink: 0; }
    .share-action-btn.is-orange { background: #FF5A00; color: #FFFFFF; }
    .share-action-btn.is-orange:hover { background: #D94E00; }
    .share-action-btn.is-orange.is-copied { background: #304642; }
    .share-action-btn.is-dark { background: #304642; color: #FFFFFF; }
    .share-action-btn.is-dark:hover { background: #243630; }
    .share-action-btn .sp-check { width: 17px; height: 17px; display: block; flex-shrink: 0; }
    .share-action-btn .sp-check-line { stroke: white; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; fill: none; stroke-dasharray: 22; stroke-dashoffset: 22; animation: sp-check 0.38s cubic-bezier(0.22,1,0.36,1) forwards; }
    @keyframes sp-check { to { stroke-dashoffset: 0; } }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 40px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: var(--shadow-header);
      border-radius: 0 0 25px 25px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(48, 70, 66, 0.08);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 40px;
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      color: var(--color-primary);
      letter-spacing: -0.5px;
      text-decoration: none;
    }

    .logo span {
      color: var(--color-accent);
      font-weight: 600;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav a {
      text-decoration: none;
      color: var(--color-primary);
      font-size: 14px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 100px;
      transition: all 0.2s var(--transition-smooth);
      opacity: 0.65;
    }

    .nav a:hover {
      opacity: 1;
      background: var(--color-tag-bg);
    }

    .nav a.active {
      opacity: 1;
      background: rgba(48, 70, 66, 0.08);
      color: var(--color-primary);
      font-weight: 600;
    }

    .nav a.locked {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .nav a.locked .lock-icon {
      width: 12px;
      height: 12px;
      opacity: 0.5;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .nav-notif-btn {
      width: 36px; height: 36px;
      background: var(--color-accent);
      border-radius: 500px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.2s, background 0.2s ease;
    }
    .nav-notif-btn:hover { transform: scale(1.08); background: #D94E00; }
    .nav-notif-icon {
      width: 12px; height: 16px;
      border-radius: 1px;
      border: 2px solid white;
      display: block;
    }

    .nav-avatar {
      width: 35px; height: 35px;
      background: #D9EBFF;
      border-radius: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      text-decoration: none;
      transition: transform 0.2s;
    }
    .nav-avatar:hover { transform: scale(1.08); }
    .nav-avatar span {
      color: #1F5591;
      font-size: 13px;
      font-weight: 600;
      line-height: 1;
      font-family: var(--font-family);
    }

    .main-container {
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - 72px);
    }

    .content-area {
      flex: 1;
      padding: 0 var(--page-margin) var(--page-margin);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    #course-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    @media (min-width: 700px) {
      #course-list {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
      }
    }

    @media (min-width: 1200px) {
      #course-list {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .course-card {
      display: flex;
      flex-direction: column;
      border-radius: 17.76px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      background: transparent;
      border: 1px solid #D8D0E8;
      box-shadow: 0 10px 28px rgba(48, 70, 66, 0.14);
      transition: transform 420ms var(--transition-smooth), box-shadow 420ms var(--transition-smooth);
      opacity: 0;
      transform: translateY(24px);
    }

    .course-card.visible {
      animation: cardEnter 0.55s var(--transition-smooth) forwards;
    }

    .course-card:nth-child(1) { animation-delay: 0.04s; }
    .course-card:nth-child(2) { animation-delay: 0.10s; }
    .course-card:nth-child(3) { animation-delay: 0.16s; }
    .course-card:nth-child(4) { animation-delay: 0.06s; }
    .course-card:nth-child(5) { animation-delay: 0.12s; }

    @keyframes cardEnter {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .course-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 22px 56px rgba(123, 104, 170, 0.22);
    }

    .course-card-top {
      height: 160px;
      background-color: #FDFCFF;
      background-image: radial-gradient(circle, rgba(0,0,0,0.07) 1px, transparent 1px);
      background-size: 20px 20px;
      position: relative;
      overflow: hidden;
      border-top-left-radius: 17.76px;
      border-top-right-radius: 17.76px;
    }

    /* Purple graduation cap icon via CSS mask */
    .course-icon-mask {
      width: 32px;
      height: 26px;
      background-color: #E1DBEB;
      -webkit-mask-image: url('SVGs/Course-Icon.svg');
      mask-image: url('SVGs/Course-Icon.svg');
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
      -webkit-mask-position: center;
      mask-position: center;
      -webkit-mask-size: contain;
      mask-size: contain;
      display: block;
    }

    .course-card-thumb {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      z-index: 0;
      transition: transform 420ms var(--transition-smooth);
    }

    .course-card:hover .course-card-thumb {
      transform: scale(1.04);
    }

    .course-card-top::before {
      display: none;
    }

    /* Card top bar: type pill left, duration + bookmark right */
    .card-top-bar {
      position: absolute;
      top: 14px; left: 14px; right: 14px;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 4; pointer-events: none;
    }
    .card-type-pill {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 14px 10px 12px; border-radius: 100px;
      background: rgba(225, 219, 235, 0.30);
      font-size: 13px; font-weight: 600; line-height: 1;
      color: #304642; white-space: nowrap;
    }
    .card-type-icon-course {
      display: inline-block;
      width: 14px; height: 14px; flex-shrink: 0;
      background-color: #304642;
      -webkit-mask-image: url('SVGs/Course-Icon.svg');
      mask-image: url('SVGs/Course-Icon.svg');
      -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
      -webkit-mask-size: contain; mask-size: contain;
      -webkit-mask-position: center; mask-position: center;
    }
    .card-top-right {
      display: flex; align-items: center; gap: 6px; pointer-events: all;
    }
    .course-duration-pill {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 10px 14px; border-radius: 100px;
      background: rgba(225, 219, 235, 0.30);
      color: #304642; font-size: 13px; font-weight: 500; line-height: 1;
      white-space: nowrap;
    }
    .course-icon-circle { display: none; }

    .card-progress {
      height: 6px;
      background: rgba(0, 0, 0, 0.12);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      position: relative;
      flex-shrink: 0;
    }

    .card-progress-fill {
      height: 100%;
      width: 0%;
      background: rgba(48, 70, 66, 1);
      border-radius: 0 6px 6px 0;
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card-progress.completed .card-progress-fill {
      width: 100%;
      background: rgba(48, 70, 66, 1);
      border-radius: 0;
    }

    .course-card.next-course {
      border: 2px solid transparent;
      background-image:
        linear-gradient(white, white),
        linear-gradient(135deg, rgba(255, 90, 0, 0.45) 0%, rgba(255, 90, 0, 0.12) 50%, rgba(255, 90, 0, 0.35) 100%);
      background-origin: border-box;
      background-clip: padding-box, border-box;
      box-shadow: 0 10px 32px rgba(255, 90, 0, 0.12), 0 2px 8px rgba(255, 90, 0, 0.08);
    }

    .course-card.next-course:hover {
      box-shadow: 0 22px 56px rgba(255, 90, 0, 0.18), 0 4px 12px rgba(255, 90, 0, 0.10);
    }

    .course-card.next-course .course-cta {
      font-weight: 700;
      color: var(--color-accent);
    }

    .course-card.next-course .course-cta-arrow {
      filter: brightness(0) saturate(100%) invert(44%) sepia(89%) saturate(3000%) hue-rotate(11deg) brightness(101%) contrast(105%);
    }

    .course-card-bottom {
      padding: 28px;
      background: white;
      border-bottom-right-radius: 17.76px;
      border-bottom-left-radius: 17.76px;
      display: flex;
      flex-direction: column;
      gap: 0;
      flex: 1;
    }

    .course-title {
      color: var(--color-primary);
      font-size: 22px;
      font-weight: 600;
      line-height: 30px;
      letter-spacing: -0.4px;
      margin-bottom: 10px;
      transition: color 200ms ease;
    }

    .course-card:hover .course-title {
      color: var(--color-primary-light);
    }

    .course-description {
      color: rgba(48, 70, 66, 0.55);
      font-size: 15px;
      font-weight: 400;
      line-height: 22px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .course-cta-row {
      margin-top: auto;
      padding-top: 20px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .card-bm-btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 8px 10px; border-radius: 100px;
      background: rgba(225, 219, 235, 0.30);
      border: none; cursor: pointer; z-index: 4;
    }
    .card-bm-btn svg { width: 14px; height: 14px; stroke: #304642; fill: none; }

    .course-cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--color-primary);
      font-size: 15px;
      font-weight: 500;
      line-height: 22px;
      text-decoration: none;
      transition: gap 250ms var(--transition-smooth);
    }

    .course-card:hover .course-cta {
      gap: 14px;
    }

    .course-cta-arrow {
      width: 15px;
      height: 15px;
      display: block;
      flex-shrink: 0;
      transition: transform 250ms var(--transition-smooth);
    }

    .course-card:hover .course-cta-arrow {
      transform: translate(5px, -3px) rotate(8deg);
    }

    .completion-indicator {
      width: 36px;
      height: 36px;
      border-radius: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.2s var(--transition-smooth);
    }

    .completion-indicator:hover {
      transform: scale(1.1);
    }

    .completion-indicator.completed {
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-light) 100%);
      box-shadow: 0 2px 8px rgba(48, 70, 66, 0.2);
    }

    .completion-indicator.completed svg {
      width: 16px;
      height: 16px;
    }

    .progress-ring {
      width: 36px;
      height: 36px;
      position: relative;
      transition: transform 0.2s var(--transition-smooth);
    }

    .progress-ring:hover {
      transform: scale(1.1);
    }

    .progress-ring svg {
      transform: rotate(-90deg);
    }

    .progress-ring circle {
      fill: none;
      stroke-width: 3;
    }

    .progress-ring .bg {
      stroke: var(--color-progress-bg);
    }

    .progress-ring .progress {
      stroke: var(--color-primary);
      stroke-linecap: round;
      transition: stroke-dashoffset 0.6s var(--transition-smooth);

    @media (max-width: 900px) {

  <script>
    localStorage.setItem('lastHub', 'supplier-hub.html');

    const courses = [
      {
        id: 'suppliers-intro',
        title: 'Intro to Supplier Management',
        description: 'The big picture of supplier management and what this learning path covers.',
        duration: '5 min',
        file: 'Suppliers-Intro-2.txt',
        thumbnail: 'Course-thumbnails/Suppliers/Suppliers_Intro.png'
      },
      {
        id: 'supplier-performance',
        title: 'Supplier Performance',
        description: 'Measure and compare your suppliers using five key performance indicators in Inact Now.',
        duration: '12 min',
        file: 'Supplier-Performance.txt',
        thumbnail: 'Course-thumbnails/Suppliers/Supplier_Performance.png'
      },
      {
        id: 'spend-analysis',
        title: 'Spend Analysis',
        description: 'Uncover inefficiencies and reduce costs using spend data in Inact Now.',
        duration: '10 min',
        file: 'Spend-Analysis.txt',
        thumbnail: 'Course-thumbnails/Suppliers/Spend_Analysis.png'
      },
      {
        id: 'supplier-negotiation',
        title: 'Supplier Negotiation',
        description: 'Use supplier and spend insights to set goals and negotiate with leverage in Inact Now.',
        duration: '8 min',
        file: 'Supplier-Negotiation.txt',
        thumbnail: 'Course-thumbnails/Suppliers/Supplier_Negotiation.png'
      }
    ];

    function parseMinutes(durationText) {
      const m = String(durationText || '').match(/(\d+)\s*min/i);
      return m ? parseInt(m[1], 10) : 0;
    }

    function formatTotalTime(totalMinutes) {
      if (!Number.isFinite(totalMinutes) || totalMinutes <= 0) return '';
      if (totalMinutes < 60) return `${totalMinutes} min`;
      const hours = totalMinutes / 60;
      return `${hours.toFixed(1)} hours`;
    }

    function getCourseProgress(courseId) {
      const key = `course_progress_${courseId}`;
      const saved = localStorage.getItem(key);
      return saved ? JSON.parse(saved) : { completed: false, progress: 0 };
    }

    function saveCourseProgress(courseId, progress, completed = false) {
      const key = `course_progress_${courseId}`;
      localStorage.setItem(key, JSON.stringify({ completed, progress }));
    }

    function renderProgressIndicator(progress, completed) {
      if (completed) {
        return `
          <div class="completion-indicator completed">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </div>
        `;
      } else if (progress > 0) {
        const circumference = 2 * Math.PI * 14;
        const offset = circumference - (progress / 100) * circumference;
        return `
          <div class="progress-ring">
            <svg width="36" height="36" viewBox="0 0 36 36">
              <circle class="bg" cx="18" cy="18" r="14"/>
              <circle class="progress" cx="18" cy="18" r="14" 
                stroke-dasharray="${circumference}" 
                stroke-dashoffset="${offset}"/>
            </svg>
          </div>
        `;
      } else {
        return '';
      }
    }

    function getNextCourseId() {
      for (const course of courses) {
        const { completed } = getCourseProgress(course.id);
        if (!completed) return course.id;
      }
      return null;
    }

    function renderCourseCard(course, index, nextCourseId) {
      const { completed, progress } = getCourseProgress(course.id);
      const href = `course.html?course=${course.file}&path=supplier&hub=supplier-hub.html&from=hub`;
      const ctaText = completed ? 'Review course' : (progress > 0 ? 'Continue course' : 'Start course');
      
      const pct = completed ? 100 : progress;
      const barClass = completed ? 'card-progress completed' : 'card-progress';
      const isNext = course.id === nextCourseId;
      
      return `
        <div class="course-card${isNext ? ' next-course' : ''}" data-course-id="${course.id}" data-href="${href}" tabindex="0">
          <div class="course-card-top">
            ${course.thumbnail ? `<img class="course-card-thumb" src="${course.thumbnail}" alt="" loading="lazy">` : ''}
            <div class="card-top-bar">
              <div class="card-type-pill"><span class="card-type-icon-course"></span>Course</div>
              <div class="card-top-right">
                <div class="course-duration-pill">${course.duration}</div>
                <button class="card-bm-btn" tabindex="-1" aria-hidden="true"><svg viewBox="0 0 24 24" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></button>
              </div>
            </div>
          </div>
          <div class="${barClass}"><div class="card-progress-fill" style="width:${pct}%"></div></div>
          <div class="course-card-bottom">
            <h2 class="course-title">${course.title}</h2>
              <p class="course-description">${course.description}</p>
            <div class="course-cta-row">
              <a href="${href}" class="course-cta">
                <span>${ctaText}</span>
                <img class="course-cta-arrow" src="SVGs/Up-Arrow.svg" alt="" aria-hidden="true">
              </a>
            </div>
          </div>
        </div>
      `;
    }

    function calculateTotalProgress() {
      let totalProgress = 0;
      let completedCount = 0;
      
      courses.forEach(course => {
        const { completed, progress } = getCourseProgress(course.id);
        if (completed) {
          totalProgress += 100;
          completedCount++;
        } else {
          totalProgress += progress;
        }
      });
      
      return {
        percentage: totalProgress / courses.length,
        completed: completedCount,
        total: courses.length
      };
    }

    function updateTotalProgress() {
      const { percentage } = calculateTotalProgress();
      const pct = Math.max(0, Math.min(100, Math.round(percentage)));
      const barEl = document.getElementById('total-progress');
      if (barEl) barEl.style.width = `${pct}%`;
      const pctEl = document.getElementById('total-progress-percent');
      if (pctEl) {
        pctEl.textContent = `${pct}%`;
      }
    }

    function getNextCourse() {
      for (const course of courses) {
        const { completed } = getCourseProgress(course.id);
        if (!completed) return course;
      }
      return courses[0];
    }

    function renderCourses() {
      const container = document.getElementById('course-list');
      const nextCourseId = getNextCourseId();
      container.innerHTML = courses.map((course, index) => renderCourseCard(course, index, nextCourseId)).join('');

      container.querySelectorAll('.course-card').forEach(card => {
        const handleOpen = (ev) => {
          const interactive = ev.target && ev.target.closest && ev.target.closest('a, button, input, textarea, select, label');
          if (interactive) return;
          const href = card.getAttribute('data-href');
          if (href) window.location.href = href;
        };
        
        card.addEventListener('click', handleOpen);
        card.addEventListener('keydown', (ev) => {
          if (ev.key === 'Enter' || ev.key === ' ') {
            ev.preventDefault();
            handleOpen(ev);
          }
        });
      });
      
      document.getElementById('flow-count').textContent = `${courses.length} resources`;

      const totalMinutes = courses.reduce((sum, c) => sum + parseMinutes(c.duration), 0);
      const totalTimeEl = document.getElementById('total-time');
      if (totalTimeEl) totalTimeEl.textContent = formatTotalTime(totalMinutes);

      const nextCourse = getNextCourse();
      const startBtn = document.getElementById('start-btn');
      const startBtnLabel = document.getElementById('start-btn-label');
      if (startBtn && nextCourse) {
        startBtn.href = `course.html?course=${nextCourse.file}&path=supplier&hub=supplier-hub.html&from=hub`;
        const { completed, progress } = getCourseProgress(nextCourse.id);
        if (startBtnLabel) {
          if (completed) startBtnLabel.textContent = 'Review';
          else if (progress > 0) startBtnLabel.textContent = 'Continue';
          else startBtnLabel.textContent = 'Start';
        }
      }
      
      updateTotalProgress();
    }

    function checkReturnFromCourse() {
      const urlParams = new URLSearchParams(window.location.search);
      const completedCourse = urlParams.get('completed');
      const progressCourse = urlParams.get('progress_course');
      const progressValue = urlParams.get('progress_value');
      
      if (completedCourse) {
        saveCourseProgress(completedCourse, 100, true);
        window.history.replaceState({}, '', 'supplier-hub.html');
      }
      
      if (progressCourse && progressValue) {
        saveCourseProgress(progressCourse, parseInt(progressValue), false);
        window.history.replaceState({}, '', 'supplier-hub.html');
      }
    }

    function observeCards() {
      const cards = document.querySelectorAll('.course-card');
      if (!('IntersectionObserver' in window)) {
        cards.forEach(c => c.classList.add('visible'));
        return;
      }
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        cards.forEach(c => c.classList.add('visible'));
        return;
      }
      const reveal = (entry, observer) => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      };
      try {
        const observer = new IntersectionObserver((entries, obs) => {
          entries.forEach(entry => reveal(entry, obs));
        }, {
          rootMargin: '0px 0px 480px 0px',
          threshold: 0.01,
        });
        cards.forEach(card => observer.observe(card));
        requestAnimationFrame(() => {
          const vh = window.innerHeight || document.documentElement.clientHeight;
          const margin = 500;
          cards.forEach(card => {
            if (card.classList.contains('visible')) return;
            const r = card.getBoundingClientRect();
            if (r.top < vh + margin && r.bottom > -margin) card.classList.add('visible');
          });
        });
      } catch (e) {
        cards.forEach(c => c.classList.add('visible'));
      }
    }

    function initBloomBtn(btn) {
      if (!btn || window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      const setOrigin = (e) => {
        const r = btn.getBoundingClientRect();
        const x = Math.max(0, Math.min(100, (e.clientX - r.left) / r.width  * 100)).toFixed(1);
        const y = Math.max(0, Math.min(100, (e.clientY - r.top)  / r.height * 100)).toFixed(1);
        btn.style.setProperty('--bloom-x', x + '%');
        btn.style.setProperty('--bloom-y', y + '%');
      };
      btn.addEventListener('mouseenter', (e) => { setOrigin(e); btn.classList.add('is-blooming'); });
      btn.addEventListener('mousemove',  (e) => { setOrigin(e); });
      btn.addEventListener('mouseleave', (e) => { setOrigin(e); btn.classList.remove('is-blooming'); });
    }

    document.addEventListener('DOMContentLoaded', () => {
      const fromParam = new URLSearchParams(window.location.search).get('from');
      const origin = sessionStorage.getItem('hub-origin') || 'catalog';
      const backBtn = document.getElementById('back-btn');
      const backLabel = document.getElementById('back-btn-label');
      if (backBtn) {
        if (fromParam === 'catalog') {
          backBtn.href = 'catalog.html';
          if (backLabel) backLabel.textContent = 'Catalog';
        } else {
          backBtn.href = 'index.html';
          if (origin === 'home') {
            if (backLabel) backLabel.textContent = 'Back to home';
          } else {
            if (backLabel) backLabel.textContent = 'Back to learning paths';
            backBtn.addEventListener('click', () => sessionStorage.setItem('return-view', 'catalog'));
          }
        }
      }
      checkReturnFromCourse();
      renderCourses();
      observeCards();
      initBloomBtn(document.getElementById('start-btn'));
    });

    const BM_SVG_OUTLINE = '<svg viewBox="0 0 14 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1H2C1.44772 1 1 1.44772 1 2V15.1745C1 15.9644 1.87272 16.4425 2.53837 16.0172L6.28636 13.6228C6.60517 13.4191 7.01163 13.4128 7.33663 13.6065L11.4881 16.0803C12.1547 16.4775 13 15.9972 13 15.2213V2C13 1.44772 12.5523 1 12 1Z"/></svg>';
    window.addEventListener('pageshow', e => {
      if (e.persisted) {
        const bm = document.querySelector('.btn-icon.is-bm');
        if (bm) bm.innerHTML = BM_SVG_OUTLINE;
      }
    });

    document.addEventListener('DOMContentLoaded', function() {
    (function() {
      const pop = document.getElementById('share-pop');
      if (!pop) return;
      const popClose = document.getElementById('share-pop-close');
      const popName  = document.getElementById('share-pop-name');
      const copyBtn  = document.getElementById('share-copy-btn');
      let activeTrigger = null;
      function openPop(trigger, name, url) {
        activeTrigger = trigger; popName.textContent = name;
        copyBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><span>Copy link</span>'; copyBtn.classList.remove('is-copied');
        pop.classList.remove('is-open'); void pop.offsetHeight;
        pop.classList.add('is-open'); positionPop(trigger);
        requestAnimationFrame(() => popClose.focus());
      }
      function closePop() { pop.classList.remove('is-open'); if (activeTrigger) { activeTrigger.focus(); activeTrigger = null; } }
      function positionPop(trigger) {
        const r = trigger.getBoundingClientRect(), pw = 320, gap = 8;
        let top = r.bottom + gap, left = r.right - pw;
        if (left < 12) left = 12;
        if (left + pw > window.innerWidth - 12) left = window.innerWidth - 12 - pw;
        const ph = pop.offsetHeight || 260;
        if (top + ph > window.innerHeight - 12) top = r.top - gap - ph;
        pop.style.top = top + 'px'; pop.style.left = left + 'px';
      }
      popClose.addEventListener('click', closePop);
      copyBtn.addEventListener('click', () => {
        copyBtn.classList.add('is-copied');
        copyBtn.classList.add('is-copied');
        copyBtn.innerHTML = '<svg class="sp-check" viewBox="0 0 20 20" fill="none"><polyline class="sp-check-line" points="4,10 8,14 16,6"/></svg> Copied!';
        setTimeout(() => { copyBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><span>Copy link</span>'; copyBtn.classList.remove('is-copied'); }, 1600);
      });
      document.addEventListener('mousedown', e => { if (!pop.classList.contains('is-open') || pop.contains(e.target) || (activeTrigger && activeTrigger.contains(e.target))) return; closePop(); });
      document.addEventListener('keydown', e => { if (e.key === 'Escape' && pop.classList.contains('is-open')) { e.preventDefault(); closePop(); } });
      const shareBtn = document.querySelector('.btn-icon.is-share');
      if (shareBtn) {
        const title = document.querySelector('.hero-title')?.textContent?.trim() || 'Learning Path';
        shareBtn.addEventListener('click', e => { e.stopPropagation(); openPop(shareBtn, title, window.location.href); });
      }
    })();
    }); // DOMContentLoaded
  </script>

  var KEY = 'inact_widget_open';
  function waitFor(sel, cb) {
    if (document.querySelector(sel)) { cb(); return; }
    var obs = new MutationObserver(function() {
      if (document.querySelector(sel)) { obs.disconnect(); cb(); }
    });
    obs.observe(document.body, { childList: true, subtree: true });
  }
  waitFor('.cw-anchor', function() {

    });
    obs.observe(anchor, { childList: true, subtree: true });

})();

<script>
(function() {
  var PP = [
    { courseIds: ['intro','double-abc','stock-policy','safety-stock','reorder-point','reorder-quantity'], courseNames: ['Introduction','Double ABC Analysis','Stock Policy','Safety Stock','Reorder Point','Reorder Quantity'], courseFiles: { 'intro': 'Intro.txt', 'double-abc': 'Double-ABC-Analysis-4.txt', 'stock-policy': 'Stock-Policy.txt', 'safety-stock': 'Safety-Stock.txt', 'reorder-point': 'Reorder-Point.txt', 'reorder-quantity': 'Reorder-Quantity.txt' }, pathParam: 'inventory', hubFile: 'hub.html' },
    { courseIds: ['suppliers-intro','supplier-performance','spend-analysis','supplier-negotiation'], courseNames: ['Intro to Supplier Management','Supplier Performance','Spend Analysis','Supplier Negotiation'], courseFiles: { 'suppliers-intro': 'Suppliers-Intro-2.txt', 'supplier-performance': 'Supplier-Performance.txt', 'spend-analysis': 'Spend-Analysis.txt', 'supplier-negotiation': 'Supplier-Negotiation.txt' }, pathParam: 'supplier', hubFile: 'supplier-hub.html' },
    { courseIds: ['now-intro','now-home','now-insights','now-actions','now-dashboards'], courseNames: ['Introduction','Home','Insights','Actions','Dashboards'], courseFiles: { 'now-intro': 'Now-Intro.txt', 'now-home': 'Now-Home.txt', 'now-insights': 'Now-Insights.txt', 'now-actions': 'Now-Actions.txt', 'now-dashboards': 'Now-Dashboards.txt' }, pathParam: 'now', hubFile: 'now-hub.html' },
    { courseIds: ['admin-intro','admin-standard','admin-custom','admin-manage'], courseNames: ['Intro: Super Users & Admins','Your Standard Solution','Customising Your Solution','Managing Users'], courseFiles: { 'admin-intro': 'Admin-Intro.txt', 'admin-standard': 'Admin-Standard.txt', 'admin-custom': 'Admin-Custom.txt', 'admin-manage': 'Admin-Manage.txt' }, pathParam: 'admin', hubFile: 'admin-hub.html' }
  ];
  function pProg(p) {
    var done = 0, sum = 0, n = p.courseIds.length;
    for (var i = 0; i < n; i++) {
      var cid = p.courseIds[i];
      if (localStorage.getItem('course_' + cid + '_completed') === 'true') { done++; sum += 100; continue; }
      var raw = localStorage.getItem('course_progress_' + cid);
      if (!raw) continue;
      try { var d = JSON.parse(raw); if (d.completed) { done++; sum += 100; } else { sum += (d.progress || 0); } }
      catch(e) { if (raw === 'completed') { done++; sum += 100; } }
    }
    return { pct: n ? Math.round(sum / n) : 0, started: sum > 0 };
  }
  function initNavProgress() {
    var btn = document.getElementById('nav-continue-btn');
    var fill = document.getElementById('nav-progress-fill');
    var tip = document.getElementById('nav-progress-tooltip');
    if (!btn || !fill || !tip) return;
    var completed = 0, sumPct = 0, active = null, bestPct = 0;
    for (var i = 0; i < PP.length; i++) {
      var pg = pProg(PP[i]);
      sumPct += pg.pct;
      if (pg.pct === 100) completed++;
      if (pg.started && pg.pct < 100 && pg.pct > bestPct) { active = PP[i]; bestPct = pg.pct; }
    }
    var overallPct = Math.round(sumPct / PP.length);
    fill.style.width = overallPct + '%';
    var pctEl = document.getElementById('nav-progress-pct');
    if (pctEl) pctEl.textContent = overallPct + '%';
    tip.textContent = completed + ' of ' + PP.length + ' learning paths completed';
    if (!active) { btn.textContent = 'Start learning'; btn.href = 'catalog.html'; return; }
    var nextId = null;
    for (var j = 0; j < active.courseIds.length; j++) {
      var cid = active.courseIds[j];
      if (localStorage.getItem('course_' + cid + '_completed') === 'true') continue;
      var raw = localStorage.getItem('course_progress_' + cid);
      if (!raw) { nextId = cid; break; }
      try { var d2 = JSON.parse(raw); if (!d2.completed) { nextId = cid; break; } }
      catch(e) { if (raw !== 'completed') { nextId = cid; break; } }
    }
    if (!nextId) nextId = active.courseIds[0];
    var idx = active.courseIds.indexOf(nextId);
    btn.textContent = 'Continue ' + (active.courseNames[idx] || 'course');
    btn.href = 'course.html?course=' + active.courseFiles[nextId] + '&path=' + active.pathParam + '&hub=' + active.hubFile + '&from=header';
  }
  if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', initNavProgress); }
  else { initNavProgress(); }
})();
</script>
